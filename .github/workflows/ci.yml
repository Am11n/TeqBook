name: CI

on:
  pull_request:
    branches: [main, develop, monorepo]
  push:
    branches: [main, develop, monorepo]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm run type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Fetch base ref for migration manifest coverage
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=200 origin ${{ github.base_ref }}
      - name: Check changed migrations are in manifest
        if: github.event_name == 'pull_request'
        run: pnpm run db:migrations:manifest-coverage
        env:
          MIGRATION_COVERAGE_BASE_REF: origin/${{ github.base_ref }}
      - name: Lint
        run: pnpm run lint
      - name: File length gate
        run: pnpm run check:file-length:ci
      - name: Dashboard API route auth pattern
        run: pnpm run check:dashboard-api-route-auth

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prettier check
        run: pnpm run format:check

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm run test:run
      - name: Dashboard i18n parity (all 15 locales)
        run: pnpm run test:i18n:dashboard

  integration:
    name: Integration and RLS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Integration tests
        run: pnpm run test:integration
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  migration-integrity:
    name: Migration Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify migration manifest coverage
        run: pnpm run db:manifest:verify
      - name: Require database URL for migration verification
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL secret must be configured for migration-integrity gate"
            exit 1
          fi
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      - name: Apply and verify migrations
        run: pnpm run db:apply && pnpm run db:verify
        env:
          TEQBOOK_DB_USE_PROCESS_ENV: "1"
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PROJECT_REF_PILOT_PRODUCTION: ${{ secrets.NEXT_PUBLIC_SUPABASE_PROJECT_REF_PILOT_PRODUCTION }}
          TEQBOOK_ENV_TARGET: pilot-production
          TEQBOOK_SUPABASE_TARGET: pilot-production

  edge-functions:
    name: Edge Functions Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check duplicate Edge Function trees stay in sync
        run: pnpm run check:supabase-functions-drift
      - name: Run Deno edge-function tests
        run: |
          files=$(find supabase/supabase/functions -name "*.test.ts" -type f | sort)
          if [ -z "$files" ]; then
            echo "No edge function tests found under supabase/supabase/functions"
            exit 1
          fi
          pnpm dlx deno-bin test --no-check $files

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Coverage
        run: pnpm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dashboard
          path: apps/dashboard/coverage/
          if-no-files-found: ignore

  coverage-extended:
    name: Coverage Extended (Public/Admin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Coverage public/admin
        run: pnpm run test:coverage:public && pnpm run test:coverage:admin
      - name: Enforce public/admin minimum coverage
        run: |
          node -e "const fs=require('fs'); const checks=[['apps/public/coverage/coverage-summary.json','public'],['apps/admin/coverage/coverage-summary.json','admin']]; const min=40; for(const [path,name] of checks){ if(!fs.existsSync(path)){ console.error(name+': missing coverage summary at '+path); process.exit(1);} const json=JSON.parse(fs.readFileSync(path,'utf8')); const lines=json.total?.lines?.pct ?? 0; const statements=json.total?.statements?.pct ?? 0; const functions=json.total?.functions?.pct ?? 0; const branches=json.total?.branches?.pct ?? 0; if(lines<min||statements<min||functions<min||branches<min){ console.error(name+': coverage below minimum '+min+'% -> lines='+lines+', statements='+statements+', functions='+functions+', branches='+branches); process.exit(1);} console.log(name+': coverage gate passed'); }"
      - name: Upload extended coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-public-admin
          path: |
            apps/public/coverage/
            apps/admin/coverage/
          if-no-files-found: ignore

  architecture:
    name: Architecture Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deep import check
        run: pnpm tsx scripts/check-deep-imports.ts
      - name: New component gate
        run: bash scripts/check-new-components.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - type-check
      - lint
      - format-check
      - security-scan
      - test
      - integration
      - migration-integrity
      - edge-functions
      - coverage
      - coverage-extended
      - architecture
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Build all workspace apps (public, dashboard, admin) and packages
      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Bundle size gate
        run: pnpm run check:bundle-size

  e2e:
    name: E2E Critical
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E critical tests
        run: pnpm run test:e2e:critical
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: E2E journey safety checks
        run: pnpm exec playwright test tests/e2e/booking-flow.spec.ts tests/e2e/billing-flow.spec.ts tests/e2e/admin-operations.spec.ts
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
