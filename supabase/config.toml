# Supabase Configuration
# This file configures Supabase Edge Functions

[functions.billing-webhook]
# Disable JWT verification for webhook endpoint
# Webhooks use Stripe signature verification instead
verify_jwt = false

[functions.rate-limit-check]
# Called from public login flow before a user has a JWT
# Must allow anonymous preflight + POST requests
verify_jwt = false

[functions.sms-status-webhook]
# Twilio posts status callbacks without Supabase JWT
verify_jwt = false

[functions.process-waitlist-expiry]
# Intended for scheduled invocation.
# verify_jwt=false is intentional: caller must present TEQBOOK_CRON_SECRET
# in Authorization header (enforced in function code).
verify_jwt = false

[functions.process-reminders]
# Intended for scheduled invocation.
# verify_jwt=false is intentional: caller must present TEQBOOK_CRON_SECRET
# in Authorization header (enforced in function code).
verify_jwt = false

[functions.billing-create-customer]
# Browser-triggered; preflight OPTIONS has no JWT.
# Function performs its own Bearer-token auth in code.
verify_jwt = false

[functions.billing-create-subscription]
# Browser-triggered; preflight OPTIONS has no JWT.
# Function performs its own Bearer-token auth in code.
verify_jwt = false

[functions.billing-update-plan]
# Browser-triggered; preflight OPTIONS has no JWT.
# Function performs its own Bearer-token auth in code.
verify_jwt = false

[functions.billing-cancel-subscription]
# Browser-triggered; preflight OPTIONS has no JWT.
# Function performs its own Bearer-token auth in code.
verify_jwt = false

[functions.billing-update-payment-method]
# Browser-triggered; preflight OPTIONS has no JWT.
# Function performs its own Bearer-token auth in code.
verify_jwt = false

[functions.billing-finalize-setup-intent]
# Browser-triggered; preflight OPTIONS has no JWT.
# Function performs its own Bearer-token auth in code.
verify_jwt = false

[functions.billing-reconcile-salons]
# Scheduled reconciliation; TEQBOOK_CRON_SECRET in Authorization header (see verifyCronSecret).
verify_jwt = false

[functions.billing-refresh-subscription-projection]
# Browser-triggered; preflight OPTIONS has no JWT. Bearer auth in function code.
verify_jwt = false
# Canonical sources live under supabase/supabase/functions; path is relative to this config file.
entrypoint = "./supabase/functions/billing-refresh-subscription-projection/index.ts"
